openapi: 3.0.0
info:
  title: envd
  version: 0.1.1
  description: API for managing files' content and controlling envd

tags:
  - name: files

paths:
  /health:
    get:
      summary: Check the health of the service
      responses:
        "204":
          description: The service is healthy

  /metrics:
    get:
      summary: Get the stats of the service
      security:
        - AccessTokenAuth: []
        - {}
      responses:
        "200":
          description: The resource usage metrics of the service
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Metrics"

  /init:
    post:
      summary: Bootstrap and update envd runtime state
      description: |
        Configure envd runtime state. Each field in the request body is optional and is
        applied independently: sync the system clock, merge environment variables, set the
        access token, configure default user / workdir, install a CA certificate into the
        system trust store, point `events.e2b.local` at the hyperloop IP, set up filesystem
        mounts, and run post-init actions.

        Before an access token has been configured, `/init` may be called anonymously so a
        trusted caller can bootstrap the guest. Once an access token is configured, later
        `/init` calls must provide `X-Access-Token`. The access token is immutable: a
        subsequent `/init` that supplies a different value returns `409 Conflict`.

        `/init` may be called more than once. Most operations are idempotent — env vars are
        merged, the CA cert is appended only if missing, mounts skip targets that are
        already mounted — but post-init actions run on every call. When `timestamp` is
        provided, requests older than the most recently applied `/init` are dropped, so
        callers can safely retry without overwriting newer state.

        Privileged fields such as `mounts` and `postInitActions` directly affect the
        sandbox's filesystem and execute arbitrary commands; they rely on the trusted
        caller / transport boundary for safety.
      security:
        - AccessTokenAuth: []
        - {}
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                hyperloopIP:
                  type: string
                  description: IP address of the hyperloop server to connect to
                envVars:
                  $ref: "#/components/schemas/EnvVars"
                accessToken:
                  type: string
                  description: Access token for secure access to envd service
                timestamp:
                  type: string
                  format: date-time
                  description: The current timestamp in RFC3339 format
                defaultUser:
                  type: string
                  description: The default user to use for operations
                defaultWorkdir:
                  type: string
                  description: The default working directory to use for operations
                mounts:
                  type: array
                  description: Mounts to set up inside the sandbox before post-init actions run
                  items:
                    $ref: "#/components/schemas/Mount"
                postInitActions:
                  type: array
                  items:
                    $ref: "#/components/schemas/PostInitAction"
                caCertPEM:
                  type: string
                  description: CA certificate in PEM format for MITM APIKEY protection to be injected into the sandbox system trust store
      responses:
        "204":
          description: Init applied successfully (or skipped because the request timestamp is older than the last applied init)
        "400":
          description: Invalid request body, or a failure occurred while applying init data (e.g. a mount or post-init action failed)
        "409":
          description: Access token has already been configured with a different value

  /envs:
    get:
      summary: Get the environment variables
      security:
        - AccessTokenAuth: []
        - {}
      responses:
        "200":
          description: Environment variables
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvVars"

  /files:
    get:
      summary: Download a file
      tags: [files]
      security:
        - AccessTokenAuth: []
        - {}
      parameters:
        - $ref: "#/components/parameters/FilePath"
        - $ref: "#/components/parameters/User"
        - $ref: "#/components/parameters/Signature"
        - $ref: "#/components/parameters/SignatureExpiration"
      responses:
        "200":
          $ref: "#/components/responses/DownloadSuccess"
        "401":
          $ref: "#/components/responses/InvalidUser"
        "400":
          $ref: "#/components/responses/InvalidPath"
        "404":
          $ref: "#/components/responses/FileNotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      summary: Upload a file and ensure the parent directories exist. If the file exists, it will be overwritten.
      tags: [files]
      security:
        - AccessTokenAuth: []
        - {}
      parameters:
        - $ref: "#/components/parameters/FilePath"
        - $ref: "#/components/parameters/User"
        - $ref: "#/components/parameters/Signature"
        - $ref: "#/components/parameters/SignatureExpiration"
      requestBody:
        $ref: "#/components/requestBodies/File"
      responses:
        "200":
          $ref: "#/components/responses/UploadSuccess"
        "400":
          $ref: "#/components/responses/InvalidPath"
        "401":
          $ref: "#/components/responses/InvalidUser"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "507":
          $ref: "#/components/responses/NotEnoughDiskSpace"

components:
  securitySchemes:
    AccessTokenAuth:
      type: apiKey
      in: header
      name: X-Access-Token

  parameters:
    FilePath:
      name: path
      in: query
      required: false
      description: Path to the file, URL encoded. Can be relative to user's home directory.
      schema:
        type: string
    User:
      name: username
      in: query
      required: false
      description: User used for setting the owner, or resolving relative paths.
      schema:
        type: string
    Signature:
      name: signature
      in: query
      required: false
      description: Signature used for file access permission verification.
      schema:
        type: string
    SignatureExpiration:
      name: signature_expiration
      in: query
      required: false
      description: Signature expiration used for defining the expiration time of the signature.
      schema:
        type: integer

  requestBodies:
    File:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            properties:
              file:
                type: string
                format: binary

  responses:
    UploadSuccess:
      description: The file was uploaded successfully.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "#/components/schemas/EntryInfo"

    DownloadSuccess:
      description: Entire file downloaded successfully.
      content:
        application/octet-stream:
          schema:
            type: string
            format: binary
            description: The file content
    InvalidPath:
      description: Invalid path
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    FileNotFound:
      description: File not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    InvalidUser:
      description: Invalid user
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotEnoughDiskSpace:
      description: Not enough disk space
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Mount:
      type: object
      required:
        - sourcePath
        - targetPath
      properties:
        sourcePath:
          type: string
          description: Mount source (block device, NFS target, or another path)
        targetPath:
          type: string
          description: Absolute path inside the sandbox where the source is mounted
        options:
          type: array
          description: Extra arguments passed verbatim to mount(8) before the source and target (e.g. `["-t", "ext4", "-o", "ro,nosuid"]`, or `["--bind"]` for bind mounts).
          items:
            type: string
    PostInitAction:
      type: object
      required:
        - argv
      properties:
        argv:
          type: array
          description: Command argv to execute directly without a shell
          items:
            type: string
        user:
          type: string
          description: Optional target user to run the command as
        cwd:
          type: string
          description: Optional working directory for the command
        envVars:
          $ref: "#/components/schemas/EnvVars"
        timeoutMs:
          type: integer
          format: int64
          description: Optional timeout in milliseconds for this command
    Error:
      required:
        - message
        - code
      properties:
        message:
          type: string
          description: Error message
        code:
          type: integer
          description: Error code
    EntryInfo:
      required:
        - path
        - name
        - type
      properties:
        path:
          type: string
          description: Path to the file
        name:
          type: string
          description: Name of the file
        type:
          type: string
          description: Type of the file
          enum:
            - file
    EnvVars:
      type: object
      description: Environment variables to set
      additionalProperties:
        type: string
    Metrics:
      type: object
      description: Resource usage metrics
      properties:
        ts:
          type: integer
          format: int64
          description: Unix timestamp in UTC for current sandbox time
        cpu_count:
          type: integer
          description: Number of CPU cores
        cpu_used_pct:
          type: number
          format: float
          description: CPU usage percentage
        mem_total:
          type: integer
          description: Total virtual memory in bytes
        mem_used:
          type: integer
          description: Used virtual memory in bytes
        disk_used:
          type: integer
          description: Used disk space in bytes
        disk_total:
          type: integer
          description: Total disk space in bytes
